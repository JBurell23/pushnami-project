services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: app
    ports:
      - "5433:5433"
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app"]
      interval: 5s
      timeout: 5s
      retries: 5

  ab-service:
    build: ./services/ab-service
    ports:
      - "4001:4001"
    environment:
      PORT: 4001
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: app
      DB_PASSWORD: app
      DB_NAME: app
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:4001/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 10s
      timeout: 5s
      retries: 3

  metrics-service:
    build: ./services/metrics-service
    ports:
      - "4002:4002"
    environment:
      PORT: 4002
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: app
      DB_PASSWORD: app
      DB_NAME: app
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:4002/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 10s
      timeout: 5s
      retries: 3

  landing:
    build: ./services/landing
    ports:
      - "5173:5173"
    environment:
      VITE_AB_SERVICE_URL: http://localhost:4001
      VITE_METRICS_SERVICE_URL: http://localhost:4002
    depends_on:
      - ab-service
      - metrics-service

  admin:
    build: ./services/admin
    ports:
      - "5174:5174"
    environment:
      VITE_AB_SERVICE_URL: http://localhost:4001
      VITE_METRICS_SERVICE_URL: http://localhost:4002
    depends_on:
      - ab-service
      - metrics-service
